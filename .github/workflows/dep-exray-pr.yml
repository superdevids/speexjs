name: Dependency Scan

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'package.json'
      - '**/package.json'
      - 'pnpm-lock.yaml'
      - 'package-lock.json'
      - 'yarn.lock'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: dep-exray Scan
        id: dep-exray
        uses: ./.github/actions/dep-exray-scan
        with:
          path: '.'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment PR
        if: steps.dep-exray.outputs.has-issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.dep-exray.outputs.report }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 dep-exray Scan Results\n\n\`\`\`\n${report}\n\`\`\``
            });

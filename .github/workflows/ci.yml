name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: cd packages/speexjs && npm ci
      - run: cd packages/speexjs && npm run typecheck
      - run: cd packages/speexjs && npm test
      - run: cd packages/speexjs && npm run build

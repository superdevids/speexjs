name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: packages/core
        run: npm ci

      - name: Build
        working-directory: packages/core
        run: npx tsup

      - name: Test
        working-directory: packages/core
        run: npx vitest run

      - name: Publish
        working-directory: packages/core
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Weekly Dependency Scan

on:
  schedule:
    - cron: '0 8 * * 1'

  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: dep-exray Scan
        id: scan
        uses: ./.github/actions/dep-exray-scan
        with:
          path: '.'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue if Issues Found
        if: steps.scan.outputs.has-issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.scan.outputs.report }}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Dependency Health Issues Found',
              body: `## dep-exray Weekly Scan\n\n\`\`\`\n${report}\n\`\`\``,
              labels: ['dependencies', 'security']
            });
